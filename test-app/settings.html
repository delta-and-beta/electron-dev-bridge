<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Settings — Test App</title>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #1a1a2e; color: #e0e0e0; padding: 24px; }
  h1 { color: #00d9c0; margin-bottom: 16px; }
  label { display: block; margin-bottom: 4px; font-size: 13px; color: #aaa; }
  select, input { display: block; width: 100%; padding: 8px 12px; margin-bottom: 12px; background: #0f3460; border: 1px solid #444; border-radius: 4px; color: #e0e0e0; }
  button { padding: 8px 16px; background: #00d9c0; color: #000; border: none; border-radius: 4px; cursor: pointer; }
  .saved { color: #3fb950; margin-top: 12px; display: none; }
</style>
</head>
<body>

<h1>Settings</h1>

<label for="theme">Theme</label>
<select id="theme" data-testid="theme-select">
  <option value="dark">Dark</option>
  <option value="light">Light</option>
</select>

<label for="language">Language</label>
<select id="language" data-testid="language-select">
  <option value="en">English</option>
  <option value="fr">French</option>
  <option value="de">German</option>
</select>

<label>
  <input type="checkbox" id="notifications" data-testid="notifications-checkbox" checked>
  Enable Notifications
</label>

<button data-testid="save-settings-btn" id="save-btn">Save Settings</button>
<div class="saved" id="saved-msg" data-testid="saved-msg">Settings saved!</div>

<script>
  // Load current settings
  window.electronAPI.settings.get().then(function(s) {
    document.getElementById('theme').value = s.theme
    document.getElementById('language').value = s.language
    document.getElementById('notifications').checked = s.notifications
  })

  // Save
  document.getElementById('save-btn').addEventListener('click', function() {
    var settings = {
      theme: document.getElementById('theme').value,
      language: document.getElementById('language').value,
      notifications: document.getElementById('notifications').checked,
    }
    window.electronAPI.settings.set(settings).then(function() {
      document.getElementById('saved-msg').style.display = 'block'
      setTimeout(function() { document.getElementById('saved-msg').style.display = 'none' }, 2000)
    })
  })
</script>

</body>
</html>
